<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damaged Produce | Sales Agent</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/manager-pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/toast.css" />
</head>
<body data-page-title="Damaged Produce" data-active-nav="goods-condition">
  <div id="salesAgentTopbar"></div>
  <div id="salesAgentSidebar"></div>

  <main class="main">
    <section class="dashboard">
      <div class="card report-table-card">
        <div class="table-card-header">
          <h4>Director Policy: Damaged Produce</h4>
        </div>
        <ul id="directorPolicyList" class="policy-list" data-policy-type="damagedProduce"></ul>
      </div>

      <div class="card report-table-card">
        <div class="table-card-header">
          <h4>Damaged Produce Log</h4>
          <button id="toggleDamagedFormBtn" class="btn filter-toggle-btn" type="button">Record Damaged Produce</button>
        </div>

        <div id="damagedFormPanel" class="filter-panel hidden">
          <form id="damagedProduceForm" class="simple-form">
            <div class="report-filters">
              <div class="filter-field">
                <label for="damageProduce">Produce Name</label>
                <select id="damageProduce" required>
                  <option value="">-- Select Produce --</option>
                </select>
              </div>
              <div class="filter-field">
                <label for="damageLotNumber">Lot Number</label>
                <input id="damageLotNumber" type="text" required placeholder="e.g. LOT-001">
              </div>
              <div class="filter-field">
                <label for="damageQty">Quantity Damaged (kg)</label>
                <input id="damageQty" type="number" min="0.1" step="0.1" required>
              </div>
              <div class="filter-field">
                <label for="damageBuyingPrice">Buying Price (UGX per kg)</label>
                <input id="damageBuyingPrice" type="number" min="1" step="1" required>
              </div>
              <div class="filter-field">
                <label for="damageDate">Date</label>
                <input id="damageDate" type="date" required>
              </div>
              <div class="filter-field">
                <label for="damageReason">Cause</label>
                <input id="damageReason" type="text" required placeholder="e.g. Water damage">
              </div>
              <div class="filter-field">
                <label for="damageNotes">Notes</label>
                <input id="damageNotes" type="text" placeholder="Optional notes">
              </div>
              <div class="filter-field profile-upload-field">
                <label for="damageImage">Image</label>
                <div class="profile-upload-wrap">
                  <img id="damageImagePreview" class="profile-upload-preview" src="../../assets/images/profile.jpg" alt="Damaged produce preview">
                  <input id="damageImage" type="file" accept="image/*" required>
                </div>
              </div>
            </div>
            <div class="filter-actions">
              <button class="btn" type="submit">Save Damaged Produce</button>
            </div>
          </form>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Produce</th>
              <th>Lot Number</th>
              <th>Quantity (kg)</th>
              <th>Buying Price (UGX/kg)</th>
              <th>Cause</th>
              <th>Recorded By</th>
              <th>Image</th>
            </tr>
          </thead>
          <tbody id="damagedProduceRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="damagedImageModal" class="edit-modal hidden">
    <div class="edit-modal-card">
      <div class="table-card-header">
        <h4>Damaged Produce Image</h4>
        <button id="closeDamagedImageModalBtn" class="btn filter-toggle-btn" type="button">Close</button>
      </div>
      <img id="damagedImageModalPreview" class="produce-image-modal-preview" src="" alt="Damaged produce image preview">
    </div>
  </div>

  <script src="../../assets/js/toast.js"></script>
  <script src="../../assets/js/sales-agent-layout.js"></script>
  <script src="../../assets/js/goods-condition-policy-view.js"></script>
  <script src="../../assets/js/damaged-produce.js"></script>
</body>
</html>
